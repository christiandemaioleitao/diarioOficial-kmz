name: Monitor Diário Oficial + Geração de KMZ

on:
  schedule:
    # 12:13 horário de Brasília (UTC-3) = 15:13 UTC
    - cron: '13 15 * * *'
  workflow_dispatch:   # Permite execução manual para testes

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necessário para bot salvar ultimo_diario.txt

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache de dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências do sistema (GDAL para geopandas)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgdal-dev gdal-bin python3-gdal

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar pipeline de monitoramento
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          URL_BASE_LOTES:   ${{ secrets.URL_BASE_LOTES }}
          GEMINI_KEY:       ${{ secrets.GEMINI_KEY }}
          MISTRAL_KEY:      ${{ secrets.MISTRAL_KEY }}
          SILICONFLOW_KEY:  ${{ secrets.SILICONFLOW_KEY }}
          GROQ_KEY:         ${{ secrets.GROQ_KEY }}
          KMZ_OUTPUT_DIR:   kmz_outputs
        run: python -m src.monitor_diario_kmz

      - name: Commitar controle de leitura atualizado
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          [ -f ultimo_diario.txt ] && git add ultimo_diario.txt || true
          [ -f ids_enviados.json ] && git add ids_enviados.json || true
          git diff --staged --quiet || \
            (git commit -m "bot: atualiza controle de leitura [skip ci]" && git push)
